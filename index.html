<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taylor Klundt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      background: #fff;
      overflow: hidden;
    }
    canvas { display: block; }
    noscript {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font: 700 clamp(2rem,8vw,5rem)/1 Arial, sans-serif;
      letter-spacing: .14em;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <noscript>TAYLOR KLUNDT</noscript>
  <script>
  (() => {
    const TEXT       = 'TAYLOR KLUNDT';
    const FONT       = 'Arial, Helvetica, sans-serif';
    const R          = 26, G = 26, B = 26;
    const GAP        = 2;
    const DOT        = 1.15;
    const ANIM_MS    = 3400;
    const STAGGER    = 0.10;

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let dpr, W, H, particles, t0, finished;

    const rand = (a, b) => a + Math.random() * (b - a);

    // Critically-damped spring produces one smooth continuous deceleration
    // with no inflection points or phase shifts.
    const K   = 7.5;
    const NORM = 1 / (1 - (1 + K) * Math.exp(-K));
    function spring(t) {
      return (1 - (1 + K * t) * Math.exp(-K * t)) * NORM;
    }

    function sampleTargets() {
      const off = document.createElement('canvas');
      const oc  = off.getContext('2d');
      off.width  = W;
      off.height = H;

      let fs = Math.min(W * 0.074, H * 0.15, 94);
      if (W < 520) fs = W * 0.088;

      oc.font         = `800 ${fs}px ${FONT}`;
      oc.textBaseline  = 'middle';
      oc.fillStyle     = '#000';

      const sp    = fs * 0.13;
      const chars = TEXT.split('');
      const tw    = chars.reduce((s, c) => s + oc.measureText(c).width + sp, 0) - sp;
      let cx      = (W - tw) / 2;

      for (const ch of chars) {
        const w = oc.measureText(ch).width;
        oc.fillText(ch, cx, H / 2);
        cx += w + sp;
      }

      const { data } = oc.getImageData(0, 0, W, H);
      const pts = [];

      for (let row = 0; row < H; row += GAP) {
        const xOff = ((row / GAP | 0) & 1) * (GAP * 0.5);
        for (let col = xOff; col < W; col += GAP) {
          const ix = Math.round(col);
          const iy = Math.round(row);
          if (ix < W && iy < H && data[(iy * W + ix) * 4 + 3] > 120) {
            pts.push({ x: ix + rand(-0.35, 0.35), y: iy + rand(-0.35, 0.35) });
          }
        }
      }
      return pts;
    }

    function buildParticles(targets) {
      const spread = Math.max(W, H) * 0.82;
      const mx = W / 2, my = H / 2;
      const diagHalf = Math.hypot(mx, my);

      return targets.map(t => {
        const a = Math.random() * Math.PI * 2;
        const d = rand(spread * 0.32, spread);

        const tDist = Math.hypot(t.x - mx, t.y - my) / diagHalf;
        const delay = rand(0, STAGGER * 0.55) + tDist * STAGGER * 0.45;

        return {
          sx: mx + Math.cos(a) * d,
          sy: my + Math.sin(a) * d,
          tx: t.x,
          ty: t.y,
          delay,
          sz: rand(DOT * 0.82, DOT * 1.18),
        };
      });
    }

    function init() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      particles = buildParticles(sampleTargets());
      t0 = performance.now();
      finished = false;
    }

    function frame(now) {
      const elapsed = now - t0;
      ctx.clearRect(0, 0, W, H);

      let running = false;

      for (let i = 0, len = particles.length; i < len; i++) {
        const p = particles[i];
        const pStart   = p.delay * ANIM_MS;
        const pElapsed = elapsed - pStart;
        const pTotal   = ANIM_MS * (1 - p.delay * 0.7);

        let t, alpha;

        if (pElapsed <= 0) {
          t = 0;
          alpha = 0.055;
          running = true;
        } else {
          const raw = Math.min(pElapsed / pTotal, 1);
          t = spring(raw);
          alpha = Math.min(1, 0.055 + t * 0.945);
          if (raw < 1) running = true;
        }

        const x = p.sx + (p.tx - p.sx) * t;
        const y = p.sy + (p.ty - p.sy) * t;

        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(x, y, p.sz, 0, 6.2832);
        ctx.fill();
      }

      ctx.globalAlpha = 1;

      if (running) {
        requestAnimationFrame(frame);
      } else if (!finished) {
        finished = true;
        ctx.clearRect(0, 0, W, H);
        for (let i = 0, len = particles.length; i < len; i++) {
          ctx.beginPath();
          ctx.arc(particles[i].tx, particles[i].ty, particles[i].sz, 0, 6.2832);
          ctx.fill();
        }
      }
    }

    ctx.fillStyle = `rgb(${R},${G},${B})`;
    init();
    requestAnimationFrame(frame);

    let rTimer;
    window.addEventListener('resize', () => {
      clearTimeout(rTimer);
      rTimer = setTimeout(() => {
        init();
        ctx.fillStyle = `rgb(${R},${G},${B})`;
        requestAnimationFrame(frame);
      }, 200);
    });
  })();
  </script>
</body>
</html>
